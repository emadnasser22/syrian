<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities Portal</title>

<style>
body { font-family: Arial; background:#f4f4f4; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { background:#fff; padding:20px; width:100%; max-width:500px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; cursor:pointer; }
.primary { background:#2c3e50; color:#fff; }
.green { background:#25D366; color:#fff; }
.bar { height:10px; background:#ddd; border-radius:5px; overflow:hidden; margin-top:10px; }
.progress { height:100%; width:0%; background:#27ae60; }
</style>
</head>

<body>

<div class="container">

<h2 id="title">Check Available Opportunities</h2>

<form id="form">
<input id="name" placeholder="Your name" required style="width:100%;padding:10px;margin-top:10px;">
<button class="primary">Start</button>
</form>

<div id="loading" style="display:none;">
<p id="status">Processing...</p>
</div>

<div id="result" style="display:none;">
<h3 id="hello"></h3>

<p>Share to continue (optional)</p>

<button class="green" id="waBtn">Share on WhatsApp</button>

<div class="bar"><div class="progress" id="bar"></div></div>

<p id="count">0 shares</p>

<button class="primary" id="goBtn" style="display:none;">Continue</button>
</div>

</div>

<script>

// ================= CONFIG =================
const BASE_CPA = "https://unlock-content.net/?964bd4a";

// Tracking
const urlParams = new URLSearchParams(window.location.search);
const source = urlParams.get("src") || "direct";

const subid = "u" + Date.now();

// Final CPA link
const cpaLink = BASE_CPA + "&s1=" + subid + "&s2=" + source;

// ================= ELEMENTS =================
const form = document.getElementById("form");
const loading = document.getElementById("loading");
const result = document.getElementById("result");
const status = document.getElementById("status");
const hello = document.getElementById("hello");

const waBtn = document.getElementById("waBtn");
const bar = document.getElementById("bar");
const countText = document.getElementById("count");
const goBtn = document.getElementById("goBtn");

let shares = 0;

// ================= FLOW =================
form.addEventListener("submit", function(e){
e.preventDefault();

form.style.display="none";
loading.style.display="block";

setTimeout(() => {
loading.style.display="none";
result.style.display="block";

hello.innerText = "Hello " + document.getElementById("name").value;

startFakeProcess();

}, 1500);

});

// ================= LOADING =================
function startFakeProcess(){
let steps = ["Checking data...", "Finding matches...", "Preparing results..."];
let i = 0;

let interval = setInterval(() => {
status.innerText = steps[i];
i++;

if(i >= steps.length){
clearInterval(interval);
showResult();
}

}, 800);
}

// ================= RESULT =================
function showResult(){
goBtn.style.display = "block";

// auto redirect after delay (soft)
setTimeout(() => {
window.open(cpaLink, "_blank");
}, 2500);
}

// ================= WHATSAPP VIRAL =================
waBtn.addEventListener("click", () => {

const msg = `I just found this interesting page 🔥

Check it here:
${window.location.origin + window.location.pathname + "?src=whatsapp"}`;

window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg), "_blank");

shares++;
bar.style.width = (shares * 33) + "%";
countText.innerText = shares + " share(s)";

if(shares >= 1){
goBtn.style.display = "block";
}

});

// ================= FINAL BUTTON =================
goBtn.addEventListener("click", () => {
window.open(cpaLink, "_blank");
});

</script>

</body>
</html>
